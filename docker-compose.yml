services:
  # ---- Original CLI service --------------------------------------------
  # One-shot analysis from terminal: docker compose run --rm tradingagents
  tradingagents:
    build: .
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  # ---- FastAPI backend (NEW primary service) --------------------------
  # REST + WebSocket API. Powers the Next.js web UI and is also usable
  # directly as the integration surface for any custom client.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tradingagents-api
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://192.168.2.34:3000,http://192.168.2.34}
    ports:
      - "${TRADINGAGENTS_API_PORT:-8000}:8000"
    volumes:
      - ./data:/home/appuser/.tradingagents
    # Map host.docker.internal → the host running this container, so a
    # configured Ollama URL of http://host.docker.internal:11434/v1 reaches
    # an Ollama instance running directly on the NAS. For Ollama on a
    # different machine, just set the explicit IP/hostname in Settings.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ---- Next.js web frontend (NEW primary UI) --------------------------
  # Connects to the api service. ``API_URL`` is the *server-side* address
  # the Next dev/standalone server uses for SSR; the browser hits the
  # public address through the rewrite proxy.
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: tradingagents-web
    environment:
      - API_URL=http://api:8000
      - NEXT_PUBLIC_WS_BASE=${NEXT_PUBLIC_WS_BASE:-ws://192.168.2.34:8000}
    ports:
      - "${TRADINGAGENTS_WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---- Streamlit GUI (LEGACY — kept as fallback during transition) ----
  # Stays running so we have a known-good fallback while the new UI
  # matures. Remove this block once you no longer need it.
  gui:
    build: .
    container_name: tradingagents-gui
    entrypoint: []
    command: >
      streamlit run gui/app.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true
      --browser.gatherUsageStats false
    env_file:
      - .env
    ports:
      - "${TRADINGAGENTS_GUI_PORT:-8501}:8501"
    volumes:
      - ./data:/home/appuser/.tradingagents
    restart: unless-stopped
    profiles:
      - legacy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ---- Optional: local Ollama models ----------------------------------
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
      - TRADINGAGENTS_BACKEND_URL=http://ollama:11434/v1
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
